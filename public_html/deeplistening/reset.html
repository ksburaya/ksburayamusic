<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Новый пароль · Квантовое Ухо</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=Raleway:wght@300;400;500&display=swap" rel="stylesheet">
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body {
  background: #0a0a0a; color: #f0ebe0;
  font-family: 'Raleway', sans-serif; font-weight: 300;
  min-height: 100vh; display: flex;
  align-items: center; justify-content: center; padding: 40px 20px;
}
:root {
  --gold: #c9a84c; --gold-glow: rgba(201,168,76,0.12);
  --border: rgba(201,168,76,0.18); --bg2: #111; --bg3: #181818;
  --text-muted: #7a7268; --text-dim: #b0a898;
}
.box {
  width: 100%; max-width: 420px;
  border: 1px solid var(--border); padding: 48px 40px;
  background: var(--bg2); position: relative;
}
.box::before {
  content: ''; position: absolute; top: -1px; left: 40px; right: 40px; height: 1px;
  background: linear-gradient(to right, transparent, var(--gold), transparent);
}
.title {
  font-family: 'Cormorant Garamond', serif;
  font-size: 2rem; font-weight: 300; color: var(--gold);
  text-align: center; margin-bottom: 8px;
}
.subtitle {
  font-size: 0.78rem; letter-spacing: 0.1em; text-transform: uppercase;
  color: var(--text-muted); text-align: center; margin-bottom: 32px;
}
.field { margin-bottom: 20px; }
.field label {
  display: block; font-size: 0.74rem; letter-spacing: 0.12em;
  text-transform: uppercase; color: var(--text-muted); margin-bottom: 8px;
}
.field input {
  width: 100%; background: var(--bg3);
  border: 1px solid var(--border); color: #f0ebe0;
  font-family: 'Raleway', sans-serif; font-size: 1rem;
  padding: 13px 16px; outline: none; transition: border-color 0.25s;
}
.field input:focus { border-color: var(--gold); }
.btn {
  width: 100%; padding: 14px;
  background: transparent; border: 1px solid var(--gold);
  color: var(--gold); font-family: 'Raleway', sans-serif;
  font-size: 0.8rem; letter-spacing: 0.15em; text-transform: uppercase;
  cursor: pointer; transition: all 0.3s; margin-top: 8px;
}
.btn:hover { background: var(--gold-glow); }
.btn:disabled { opacity: 0.5; cursor: default; }
.msg { font-size: 0.82rem; text-align: center; margin-top: 16px; min-height: 20px; }
.msg.error { color: #c07060; }
.msg.success { color: var(--gold); }
.back {
  display: block; text-align: center; margin-top: 20px;
  font-size: 0.74rem; letter-spacing: 0.1em; text-transform: uppercase;
  color: var(--text-muted); text-decoration: none; transition: color 0.25s;
}
.back:hover { color: var(--gold); }
</style>
</head>
<body>
<div class="box">
  <div class="title">Квантовое Ухо</div>

  <!-- Форма нового пароля -->
  <div id="form-reset">
    <div class="subtitle">Новый пароль</div>
    <div class="field">
      <label>Новый пароль</label>
      <input type="password" id="new-pass" placeholder="минимум 6 символов" autocomplete="new-password">
    </div>
    <div class="field">
      <label>Повторите пароль</label>
      <input type="password" id="new-pass2" placeholder="••••••••" autocomplete="new-password">
    </div>
    <button class="btn" id="btn-reset" onclick="doReset()">Сохранить пароль</button>
    <div class="msg error" id="reset-error"></div>
  </div>

  <!-- Успех -->
  <div id="form-success" style="display:none; text-align:center">
    <div style="font-size:2rem;color:var(--gold);margin-bottom:16px">✦</div>
    <div class="subtitle">Пароль изменён</div>
    <p style="font-size:0.86rem;color:var(--text-dim);line-height:1.8;margin-bottom:24px">
      Теперь вы можете войти с новым паролем.
    </p>
    <a href="/journal/journal.html" class="btn" style="display:block;text-align:center;text-decoration:none;padding:14px">Войти</a>
  </div>

  <a href="/journal/journal.html" class="back">← Вернуться ко входу</a>
</div>

<script>
const token = new URLSearchParams(window.location.search).get('token');

if (!token) {
  document.getElementById('reset-error').textContent = 'Ссылка недействительна.';
  document.getElementById('btn-reset').disabled = true;
}

async function doReset() {
  const pass  = document.getElementById('new-pass').value;
  const pass2 = document.getElementById('new-pass2').value;
  const err   = document.getElementById('reset-error');

  if (pass.length < 6) { err.textContent = 'Пароль минимум 6 символов'; return; }
  if (pass !== pass2)  { err.textContent = 'Пароли не совпадают'; return; }

  const btn = document.getElementById('btn-reset');
  btn.disabled = true; btn.style.opacity = '0.5';

  try {
    const res  = await fetch('/journal/api/reset.php', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ token, password: pass })
    });
    const data = await res.json();
    if (!res.ok) { err.textContent = data.error || 'Ошибка'; btn.disabled = false; btn.style.opacity = '1'; return; }
    document.getElementById('form-reset').style.display = 'none';
    document.getElementById('form-success').style.display = 'block';
  } catch {
    err.textContent = 'Нет соединения с сервером';
    btn.disabled = false; btn.style.opacity = '1';
  }
}
</script>
</body>
</html>
