<!DOCTYPE html>

<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Восстановление пароля · Квантовое Ухо</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=Raleway:wght@300;400;500&display=swap" rel="stylesheet">
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body {
  background: #0a0a0a; color: #f0ebe0;
  font-family: 'Raleway', sans-serif; font-weight: 300;
  min-height: 100vh; display: flex;
  align-items: center; justify-content: center; padding: 40px 20px;
}
:root {
  --gold: #c9a84c; --gold-glow: rgba(201,168,76,0.12);
  --border: rgba(201,168,76,0.18); --bg2: #111; --bg3: #181818;
  --text-muted: #7a7268; --text-dim: #b0a898;
}
.box {
  width: 100%; max-width: 420px;
  border: 1px solid var(--border); padding: 48px 40px;
  background: var(--bg2); position: relative;
}
.box::before {
  content: ''; position: absolute; top: -1px; left: 40px; right: 40px; height: 1px;
  background: linear-gradient(to right, transparent, var(--gold), transparent);
}
.title {
  font-family: 'Cormorant Garamond', serif;
  font-size: 2rem; font-weight: 300; color: var(--gold);
  text-align: center; margin-bottom: 8px;
}
.subtitle {
  font-size: 0.78rem; letter-spacing: 0.1em; text-transform: uppercase;
  color: var(--text-muted); text-align: center; margin-bottom: 10px;
}
.description {
  font-size: 0.84rem; color: var(--text-dim); line-height: 1.8;
  text-align: center; margin-bottom: 32px;
}
.field { margin-bottom: 20px; }
.field label {
  display: block; font-size: 0.74rem; letter-spacing: 0.12em;
  text-transform: uppercase; color: var(--text-muted); margin-bottom: 8px;
}
.field input {
  width: 100%; background: var(--bg3);
  border: 1px solid var(--border); color: #f0ebe0;
  font-family: 'Raleway', sans-serif; font-size: 1rem;
  padding: 13px 16px; outline: none; transition: border-color 0.25s;
}
.field input:focus { border-color: var(--gold); }
.field input::placeholder { color: var(--text-muted); }
.btn {
  width: 100%; padding: 14px;
  background: transparent; border: 1px solid var(--gold);
  color: var(--gold); font-family: 'Raleway', sans-serif;
  font-size: 0.8rem; letter-spacing: 0.15em; text-transform: uppercase;
  cursor: pointer; transition: all 0.3s; margin-top: 8px;
}
.btn:hover { background: var(--gold-glow); }
.btn:disabled { opacity: 0.5; cursor: default; }
.msg { font-size: 0.82rem; text-align: center; margin-top: 16px; min-height: 20px; }
.msg.error { color: #c07060; }
.back {
  display: block; text-align: center; margin-top: 24px;
  font-size: 0.74rem; letter-spacing: 0.1em; text-transform: uppercase;
  color: var(--text-muted); text-decoration: none; transition: color 0.25s;
}
.back:hover { color: var(--gold); }
</style>
</head>
<body>
<div class="box">
  <div class="title">Квантовое Ухо</div>

  <!-- Форма запроса -->

  <div id="form-request">
    <div class="subtitle">Восстановление пароля</div>
    <p class="description">Введите email — мы пришлём ссылку для создания нового пароля.</p>
    <div class="field">
      <label>Email</label>
      <input type="email" id="forgot-email" placeholder="your@email.com" autocomplete="email">
    </div>
    <button class="btn" id="btn-send" onclick="doForgot()">Отправить ссылку</button>
    <div class="msg error" id="forgot-error"></div>
  </div>

  <!-- Успех -->

  <div id="form-success" style="display:none; text-align:center">
    <div style="font-size:2rem;color:var(--gold);margin-bottom:16px">✦</div>
    <div class="subtitle">Письмо отправлено</div>
    <p style="font-size:0.86rem;color:var(--text-dim);line-height:1.9;margin-bottom:8px">
      Если этот email зарегистрирован в дневнике —<br>
      письмо со ссылкой придёт в течение нескольких минут.
    </p>
    <p style="font-size:0.78rem;color:var(--text-muted);line-height:1.7">
      Проверьте папку «Спам» если письмо не пришло.
    </p>
  </div>

<a href="/journal/journal.html" class="back">← Вернуться ко входу</a>

</div>

<script>
async function doForgot() {
  const email = document.getElementById('forgot-email').value.trim().toLowerCase();
  const err   = document.getElementById('forgot-error');

  if (!email) { err.textContent = 'Введите email'; return; }

  const btn = document.getElementById('btn-send');
  btn.disabled = true; btn.style.opacity = '0.5';

  try {
    const res  = await fetch('/journal/api/forgot.php', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ email })
    });
    const data = await res.json();
    if (!res.ok) {
      err.textContent = data.error || 'Ошибка';
      btn.disabled = false; btn.style.opacity = '1';
      return;
    }
    document.getElementById('form-request').style.display = 'none';
    document.getElementById('form-success').style.display = 'block';
  } catch {
    err.textContent = 'Нет соединения с сервером';
    btn.disabled = false; btn.style.opacity = '1';
  }
}

// Enter отправляет форму
document.getElementById('forgot-email').addEventListener('keydown', e => {
  if (e.key === 'Enter') doForgot();
});
</script>

</body>
</html>
