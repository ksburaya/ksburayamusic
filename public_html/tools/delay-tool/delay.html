<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Delay</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    background: #0a0a0a;
    font-family: 'Courier New', monospace;
    color: #e8e4d8;
  }

  .container {
    width: 380px;
    padding: 40px 36px;
    background: #111;
    border: 1px solid #2a2a2a;
  }

  .title {
    font-size: 11px;
    letter-spacing: 0.25em;
    text-transform: uppercase;
    color: #555;
    margin-bottom: 40px;
  }

  .device-item {
    display: flex;
    flex-direction: column;
    gap: 8px;
    margin-bottom: 20px;
  }

  .device-select {
    width: 100%;
    padding: 10px 12px;
    background: #111;
    border: 1px solid #3a3a3a;
    color: #e8e4d8;
    font-family: 'Courier New', monospace;
    font-size: 11px;
    letter-spacing: 0.1em;
    cursor: pointer;
    outline: none;
    -webkit-appearance: none;
    appearance: none;
  }

  .device-select:disabled {
    opacity: 0.35;
    cursor: default;
  }

  .connect-btn {
    width: 100%;
    padding: 14px;
    background: transparent;
    border: 1px solid #3a3a3a;
    color: #e8e4d8;
    font-family: 'Courier New', monospace;
    font-size: 12px;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    cursor: pointer;
    transition: border-color 0.2s, color 0.2s;
    margin-bottom: 40px;
  }

  .connect-btn:hover { border-color: #888; }
  .connect-btn.active { border-color: #5cb890; color: #5cb890; }
  .connect-btn.error { border-color: #c0614a; color: #c0614a; }

  .controls { display: flex; flex-direction: column; gap: 32px; }

  .control { display: flex; flex-direction: column; gap: 12px; }

  .control-header {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
  }

  .control-label {
    font-size: 10px;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: #555;
  }

  .control-value {
    font-size: 22px;
    font-weight: normal;
    color: #e8e4d8;
    min-width: 60px;
    text-align: right;
  }

  .control-unit {
    font-size: 11px;
    color: #444;
    margin-left: 3px;
  }

  input[type=range] {
    -webkit-appearance: none;
    appearance: none;
    width: 100%;
    height: 1px;
    background: #2a2a2a;
    outline: none;
    cursor: pointer;
  }

  input[type=range]::-webkit-slider-thumb {
    -webkit-appearance: none;
    width: 14px;
    height: 14px;
    background: #e8e4d8;
    border-radius: 50%;
    cursor: pointer;
    transition: background 0.2s;
  }

  input[type=range]::-webkit-slider-thumb:hover { background: #fff; }

  input[type=range]::-moz-range-thumb {
    width: 14px;
    height: 14px;
    background: #e8e4d8;
    border-radius: 50%;
    border: none;
    cursor: pointer;
  }

  .viz-wrap {
    margin-top: 40px;
    height: 48px;
    position: relative;
  }

  canvas {
    width: 100%;
    height: 100%;
    display: block;
  }

  .status {
    margin-top: 24px;
    font-size: 10px;
    letter-spacing: 0.15em;
    color: #333;
    text-transform: uppercase;
    min-height: 14px;
  }

  .status.on { color: #5cb890; }
  .status.err { color: #c0614a; }

  .reset-btn {
    width: 100%;
    padding: 10px;
    background: transparent;
    border: 1px solid #222;
    color: #333;
    font-family: 'Courier New', monospace;
    font-size: 11px;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    cursor: default;
    margin-top: 20px;
    transition: border-color 0.2s, color 0.2s;
  }

  .reset-btn:not(:disabled) {
    border-color: #3a3a3a;
    color: #e8e4d8;
    cursor: pointer;
  }

  .reset-btn:not(:disabled):hover { border-color: #888; }
</style>
</head>
<body>

<div class="container">
  <p class="title">Delay</p>

  <div class="device-item">
    <span class="control-label">Вход</span>
    <select id="inputSelect" class="device-select"></select>
  </div>
  <div class="device-item" id="outputWrap">
    <span class="control-label">Выход</span>
    <select id="outputSelect" class="device-select"></select>
  </div>

  <button class="connect-btn" id="btn">Подключить вход</button>

  <div class="controls">
    <div class="control">
      <div class="control-header">
        <span class="control-label">Время</span>
        <span class="control-value" id="timeVal">4<span class="control-unit">с</span></span>
      </div>
      <input type="range" id="timeSlider" min="1" max="20" step="1" value="4">
    </div>

    <div class="control">
      <div class="control-header">
        <span class="control-label">Затухание</span>
        <span class="control-value" id="fbVal">70<span class="control-unit">%</span></span>
      </div>
      <input type="range" id="fbSlider" min="5" max="95" step="1" value="70">
    </div>

    <div class="control">
      <div class="control-header">
        <span class="control-label">Баланс</span>
        <span class="control-value" id="mixVal">50<span class="control-unit">%</span></span>
      </div>
      <input type="range" id="mixSlider" min="0" max="100" step="1" value="50">
    </div>
  </div>

  <div class="viz-wrap">
    <canvas id="canvas"></canvas>
  </div>

  <button class="reset-btn" id="resetBtn" disabled>Сброс</button>

  <p class="status" id="status"></p>
</div>

<script>
let ctx, sourceNode, delayNode, feedbackGain, dryGain, wetGain, analyser, animId;
let running = false;
let currentStream = null;

const btn = document.getElementById('btn');
const status = document.getElementById('status');
const timeSlider = document.getElementById('timeSlider');
const fbSlider = document.getElementById('fbSlider');
const mixSlider = document.getElementById('mixSlider');
const canvas = document.getElementById('canvas');
const canvasCtx = canvas.getContext('2d');

async function initDevices() {
  try {
    const tmp = await navigator.mediaDevices.getUserMedia({ audio: true });
    tmp.getTracks().forEach(t => t.stop());
  } catch(e) {
    status.textContent = 'Нет доступа к микрофону';
    status.className = 'status err';
    return;
  }

  const devices = await navigator.mediaDevices.enumerateDevices();
  const inputs = devices.filter(d => d.kind === 'audioinput');
  const outputs = devices.filter(d => d.kind === 'audiooutput');

  const inputSelect = document.getElementById('inputSelect');
  const outputSelect = document.getElementById('outputSelect');

  inputSelect.innerHTML = inputs.map((d, i) =>
    `<option value="${d.deviceId}">${d.label || 'Вход ' + (i + 1)}</option>`
  ).join('');

  outputSelect.innerHTML = outputs.map((d, i) =>
    `<option value="${d.deviceId}">${d.label || 'Выход ' + (i + 1)}</option>`
  ).join('');

  if (typeof AudioContext.prototype.setSinkId !== 'function') {
    document.getElementById('outputWrap').style.display = 'none';
  }
}

document.addEventListener('DOMContentLoaded', initDevices);

function updateTimeDisplay() {
  document.getElementById('timeVal').innerHTML = timeSlider.value + '<span class="control-unit">с</span>';
}
function updateFbDisplay() {
  document.getElementById('fbVal').innerHTML = fbSlider.value + '<span class="control-unit">%</span>';
}
function updateMixDisplay() {
  document.getElementById('mixVal').innerHTML = mixSlider.value + '<span class="control-unit">%</span>';
}

timeSlider.addEventListener('input', () => {
  updateTimeDisplay();
  if (delayNode) {
    delayNode.delayTime.setTargetAtTime(parseFloat(timeSlider.value), ctx.currentTime, 0.05);
  }
});

fbSlider.addEventListener('input', () => {
  updateFbDisplay();
  if (feedbackGain) {
    feedbackGain.gain.setTargetAtTime((100 - parseInt(fbSlider.value)) / 100, ctx.currentTime, 0.05);
  }
});

mixSlider.addEventListener('input', () => {
  updateMixDisplay();
  if (dryGain) {
    const wet = parseInt(mixSlider.value) / 100;
    dryGain.gain.setTargetAtTime(1 - wet, ctx.currentTime, 0.05);
    wetGain.gain.setTargetAtTime(wet, ctx.currentTime, 0.05);
  }
});

btn.addEventListener('click', async () => {
  if (running) {
    stop();
    return;
  }
  try {
    status.textContent = '';
    status.className = 'status';

    const inputSelect = document.getElementById('inputSelect');
    const stream = await navigator.mediaDevices.getUserMedia({
      audio: {
        deviceId: inputSelect.value ? { exact: inputSelect.value } : undefined,
        echoCancellation: false,
        noiseSuppression: false,
        autoGainControl: false
      }
    });
    currentStream = stream;

    ctx = new (window.AudioContext || window.webkitAudioContext)();
    const outputSelect = document.getElementById('outputSelect');
    if (outputSelect.value && typeof ctx.setSinkId === 'function') {
      try {
        await ctx.setSinkId(outputSelect.value);
      } catch(sinkErr) {
        // Continue with default output if selected device fails
      }
    }
    sourceNode = ctx.createMediaStreamSource(stream);

    delayNode = ctx.createDelay(20.0);
    delayNode.delayTime.value = parseFloat(timeSlider.value);

    feedbackGain = ctx.createGain();
    feedbackGain.gain.value = (100 - parseInt(fbSlider.value)) / 100;

    dryGain = ctx.createGain();
    wetGain = ctx.createGain();
    const mix = parseInt(mixSlider.value) / 100;
    dryGain.gain.value = 1 - mix;
    wetGain.gain.value = mix;

    analyser = ctx.createAnalyser();
    analyser.fftSize = 512;

    sourceNode.connect(dryGain);
    sourceNode.connect(delayNode);
    delayNode.connect(feedbackGain);
    feedbackGain.connect(delayNode);
    delayNode.connect(wetGain);
    dryGain.connect(analyser);
    wetGain.connect(analyser);
    analyser.connect(ctx.destination);

    running = true;
    btn.textContent = 'Отключить';
    btn.classList.add('active');
    status.textContent = 'Слушаем';
    status.className = 'status on';
    document.getElementById('inputSelect').disabled = true;
    document.getElementById('outputSelect').disabled = true;
    document.getElementById('resetBtn').disabled = false;

    drawLoop();
  } catch(e) {
    if (currentStream) {
      currentStream.getTracks().forEach(t => t.stop());
      currentStream = null;
    }
    btn.classList.remove('error');
    btn.classList.add('error');
    status.textContent = 'Нет доступа к микрофону';
    status.className = 'status err';
  }
});

function stop() {
  if (sourceNode) sourceNode.disconnect();
  if (ctx) ctx.close();
  if (currentStream) {
    currentStream.getTracks().forEach(t => t.stop());
    currentStream = null;
  }
  document.getElementById('inputSelect').disabled = false;
  document.getElementById('outputSelect').disabled = false;
  document.getElementById('resetBtn').disabled = true;
  cancelAnimationFrame(animId);
  running = false;
  btn.textContent = 'Подключить вход';
  btn.className = 'connect-btn';
  status.textContent = '';
  status.className = 'status';
  canvasCtx.clearRect(0, 0, canvas.width, canvas.height);
}

async function resetBuffer() {
  if (!running || !currentStream) return;

  cancelAnimationFrame(animId);
  if (sourceNode) sourceNode.disconnect();
  await ctx.close();

  try {
    ctx = new (window.AudioContext || window.webkitAudioContext)();

    const outputSelect = document.getElementById('outputSelect');
    if (outputSelect.value && typeof ctx.setSinkId === 'function') {
      try {
        await ctx.setSinkId(outputSelect.value);
      } catch(sinkErr) {
        // Continue with default output if selected device fails
      }
    }

    sourceNode = ctx.createMediaStreamSource(currentStream);

    delayNode = ctx.createDelay(20.0);
    delayNode.delayTime.value = parseFloat(timeSlider.value);

    feedbackGain = ctx.createGain();
    feedbackGain.gain.value = (100 - parseInt(fbSlider.value)) / 100;

    dryGain = ctx.createGain();
    wetGain = ctx.createGain();
    const mix = parseInt(mixSlider.value) / 100;
    dryGain.gain.value = 1 - mix;
    wetGain.gain.value = mix;

    analyser = ctx.createAnalyser();
    analyser.fftSize = 512;

    sourceNode.connect(dryGain);
    sourceNode.connect(delayNode);
    delayNode.connect(feedbackGain);
    feedbackGain.connect(delayNode);
    delayNode.connect(wetGain);
    dryGain.connect(analyser);
    wetGain.connect(analyser);
    analyser.connect(ctx.destination);

    canvasCtx.clearRect(0, 0, canvas.width, canvas.height);
    drawLoop();
  } catch(e) {
    stop();
    status.textContent = 'Ошибка сброса';
    status.className = 'status err';
  }
}

document.getElementById('resetBtn').addEventListener('click', resetBuffer);

function drawLoop() {
  animId = requestAnimationFrame(drawLoop);
  const W = canvas.offsetWidth;
  const H = canvas.offsetHeight;
  if (canvas.width !== W) canvas.width = W;
  if (canvas.height !== H) canvas.height = H;

  const buf = new Uint8Array(analyser.frequencyBinCount);
  analyser.getByteTimeDomainData(buf);

  canvasCtx.clearRect(0, 0, W, H);
  canvasCtx.beginPath();
  canvasCtx.strokeStyle = '#3a3a3a';
  canvasCtx.lineWidth = 1;
  canvasCtx.moveTo(0, H / 2);
  canvasCtx.lineTo(W, H / 2);
  canvasCtx.stroke();

  canvasCtx.beginPath();
  canvasCtx.strokeStyle = '#5cb890';
  canvasCtx.lineWidth = 1.5;

  const step = W / buf.length;
  for (let i = 0; i < buf.length; i++) {
    const y = ((buf[i] / 128.0) - 1) * (H / 2) + H / 2;
    if (i === 0) canvasCtx.moveTo(0, y);
    else canvasCtx.lineTo(i * step, y);
  }
  canvasCtx.stroke();
}
</script>
</body>
</html>
